      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchBankBody"
      responses:
        "200":
          description: Transaction matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTransaction"

  /bank/{id}/unmatch:
    put:
      operationId: unmatchBankTransaction
