    get:
      operationId: getBank
      tags: [accounting]
      summary: List bank transactions
      responses:
        "200":
          description: List of bank transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankTransaction"
    post:
      operationId: createBankTransaction
      tags: [accounting]
      summary: Create bank transaction manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBankTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTransaction"

  /bank/import:
    post:
      operationId: importBankTransactions
      tags: [accounting]
      summary: Import bank transactions from CSV rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportBankBody"
      responses:
        "201":
          description: Transactions imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: number
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/BankTransaction"
                required:
                  - imported
                  - rows

