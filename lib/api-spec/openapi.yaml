openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vanilla Export ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: suppliers
    description: Supplier management
  - name: purchases
    description: Purchase management
  - name: lots
    description: Lot management
  - name: clients
    description: Client management
  - name: sales
    description: Sales management
  - name: accounting
    description: Accounting & journal
  - name: dashboard
    description: Dashboard analytics
  - name: stock
    description: Stock movements
  - name: payments
    description: Client payments
  - name: hr
    description: HR module — employees, leaves, attendance, requests

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /suppliers:
    get:
      operationId: getSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "200":
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /purchases:
    get:
      operationId: getPurchases
      tags: [purchases]
      summary: List all purchases
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase (auto-creates lot + stock movement + journal entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBody"
      responses:
        "201":
          description: Purchase created with lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseWithLot"

  /lots:
    get:
      operationId: getLots
      tags: [lots]
      summary: List all lots
      responses:
        "200":
          description: List of lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lot"

  /lots/{id}:
    get:
      operationId: getLot
      tags: [lots]
      summary: Get a lot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
    put:
      operationId: updateLot
      tags: [lots]
      summary: Update a lot (records LOSS stock movement if weight changed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLotBody"
      responses:
        "200":
          description: Lot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"

  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: List all sales
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (validates stock, records OUT movements + journal entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Business rule violation (stock insufficient, lot not ready, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: List all payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a client payment (debit 512 / credit 411)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /stock-movements:
    get:
      operationId: getStockMovements
      tags: [stock]
      summary: List all stock movements
      responses:
        "200":
          description: List of stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /journal:
    get:
      operationId: getJournal
      tags: [accounting]
      summary: List journal entries
      responses:
        "200":
          description: List of journal entries with lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /accounts:
    get:
      operationId: getAccounts
      tags: [accounting]
      summary: List chart of accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/lot-status:
    get:
      operationId: getLotStatusBreakdown
      tags: [dashboard]
      summary: Lot status breakdown
      responses:
        "200":
          description: Lot status counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LotStatusCount"

  /employees:
    get:
      operationId: getEmployees
      tags: [hr]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [hr]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/export/csv:
    get:
      operationId: exportEmployeesCsv
      tags: [hr]
      summary: Export employee list as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [hr]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /leaves:
    get:
      operationId: getLeaves
      tags: [hr]
      summary: List all leave requests
      parameters:
        - name: employeeId
          in: query
          schema:
            type: string
          description: Filter by employee
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: List of leaves
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Leave"
    post:
      operationId: createLeave
      tags: [hr]
      summary: Submit a leave request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveBody"
      responses:
        "201":
          description: Leave request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leave"

  /leaves/stats:
    get:
      operationId: getLeaveStats
      tags: [hr]
      summary: Get leave dashboard stats
      responses:
        "200":
          description: Leave stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveStats"

  /leaves/balances:
    get:
      operationId: getLeaveBalances
      tags: [hr]
      summary: Get leave balances for all employees
      parameters:
        - name: year
          in: query
          schema:
            type: number
          description: Year (defaults to current year)
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  /leaves/balances/{employeeId}:
    get:
      operationId: getLeaveBalance
      tags: [hr]
      summary: Get leave balance for one employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Leave balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBalance"

  /leaves/{id}:
    delete:
      operationId: deleteLeave
      tags: [hr]
      summary: Cancel/delete a leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leave"

  /leaves/{id}/approve:
    put:
      operationId: approveLeave
      tags: [hr]
      summary: Approve or reject a leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLeaveBody"
      responses:
        "200":
          description: Leave updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leave"

  /attendance:
    get:
      operationId: getAttendance
      tags: [hr]
      summary: List attendance records
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: Filter by date (YYYY-MM-DD)
        - name: employeeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/checkin:
    post:
      operationId: checkIn
      tags: [hr]
      summary: Record employee check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInBody"
      responses:
        "201":
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/checkout:
    post:
      operationId: checkOut
      tags: [hr]
      summary: Record employee check-out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutBody"
      responses:
        "200":
          description: Check-out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/month:
    get:
      operationId: getAttendanceMonth
      tags: [hr]
      summary: List all attendance records for a given month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
          description: Month in YYYY-MM format
        - name: employeeId
          in: query
          schema:
            type: string
          description: Filter by employee
      responses:
        "200":
          description: List of attendance records for the month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/manual:
    post:
      operationId: createManualAttendance
      tags: [hr]
      summary: Create or update attendance record manually (any date)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualAttendanceBody"
      responses:
        "200":
          description: Attendance record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "201":
          description: Attendance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /hr-requests:
    get:
      operationId: getHrRequests
      tags: [hr]
      summary: List HR requests
      responses:
        "200":
          description: List of HR requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HrRequest"
    post:
      operationId: createHrRequest
      tags: [hr]
      summary: Submit an HR request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHrRequestBody"
      responses:
        "201":
          description: HR request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrRequest"

  /hr-requests/{id}:
    put:
      operationId: updateHrRequest
      tags: [hr]
      summary: Update HR request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHrRequestBody"
      responses:
        "200":
          description: HR request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrRequest"

  /dashboard/hr-summary:
    get:
      operationId: getHrDashboardSummary
      tags: [hr]
      summary: HR dashboard summary
      responses:
        "200":
          description: HR summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrDashboardSummary"

  /payroll:
    get:
      operationId: getPayrolls
      tags: [hr]
      summary: List payroll records
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: employeeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of payroll records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRecord"
    post:
      operationId: generatePayroll
      tags: [hr]
      summary: Generate payroll for an employee and month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePayrollBody"
      responses:
        "201":
          description: Payroll generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  /bonuses:
    get:
      operationId: getBonuses
      tags: [hr]
      summary: List all production bonuses
      parameters:
        - name: employeeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bonuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BonusRecord"
    post:
      operationId: createBonus
      tags: [hr]
      summary: Award a production bonus (lot-based)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBonusBody"
      responses:
        "201":
          description: Bonus created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusRecord"

  /candidates:
    get:
      operationId: getCandidates
      tags: [hr]
      summary: List recruitment candidates
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"
    post:
      operationId: createCandidate
      tags: [hr]
      summary: Add a new candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateBody"
      responses:
        "201":
          description: Candidate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    put:
      operationId: updateCandidate
      tags: [hr]
      summary: Update candidate status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCandidateBody"
      responses:
        "200":
          description: Candidate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /onboarding:
    get:
      operationId: getOnboardingTasks
      tags: [hr]
      summary: List onboarding tasks
      parameters:
        - name: employeeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of onboarding tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OnboardingTask"
    post:
      operationId: createOnboardingTask
      tags: [hr]
      summary: Create onboarding task for employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnboardingTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"

  /onboarding/{id}:
    put:
      operationId: updateOnboardingTask
      tags: [hr]
      summary: Update onboarding task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOnboardingTaskBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"

  /partners:
    get:
      operationId: getPartners
      tags: [accounting]
      summary: List accounting partners (tiers)
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingPartner"
    post:
      operationId: createPartner
      tags: [accounting]
      summary: Create accounting partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerBody"
      responses:
        "201":
          description: Partner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingPartner"

  /partners/{id}:
    put:
      operationId: updatePartner
      tags: [accounting]
      summary: Update accounting partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
