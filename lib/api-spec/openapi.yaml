          in: query
          schema:
            type: string
          description: sale | purchase
        - name: status
          in: query
          schema:
            type: string
          description: draft | validated | paid
        - name: partnerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingInvoice"
    post:
      operationId: createInvoice
      tags: [accounting]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingInvoice"

